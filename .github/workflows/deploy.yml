name: Deploy to risker.co.kr

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (pre-check)
        run: pnpm turbo build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          script: |
            set -e

            echo "=== Pulling latest code ==="
            cd /opt/risker-pubg-analyzer
            git pull origin main

            echo "=== Rebuilding and restarting containers ==="
            docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

            echo "=== Waiting for containers to be ready ==="
            sleep 15

            echo "=== Container status ==="
            docker compose -f docker-compose.prod.yml ps

            echo "=== Running DB migrations ==="
            docker compose -f docker-compose.prod.yml exec -T api pnpm db:migrate || true

            echo "=== Deploy complete ==="

      - name: Health Check
        run: |
          echo "Waiting for app to be ready..."
          sleep 30

          # API health check
          curl -f --retry 5 --retry-delay 10 \
            http://${{ secrets.SERVER_HOST }}/risker-pubg-analyzer/api/health \
            || (echo "Health check failed" && exit 1)

          echo "Health check passed!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed! Check the logs above."
          exit 1
