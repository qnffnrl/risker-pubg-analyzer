<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>

  <!-- Crown spikes -->
  <polygon points="6,16 8,8 10,14" fill="#8090a8"/>
  <polygon points="10,14 13,6 15,13" fill="#9aa8bc"/>
  <polygon points="15,13 16,5 17,13" fill="#b0bcc8"/>
  <polygon points="17,13 19,6 22,14" fill="#9aa8bc"/>
  <polygon points="22,14 24,8 26,16" fill="#8090a8"/>

  <!-- Crown band -->
  <rect x="6" y="14" width="20" height="5" rx="1" fill="#6878a0"/>
  <!-- Crown gems -->
  <rect x="14.5" y="15" width="3" height="3" rx="0.5" fill="#cc2222" transform="rotate(45 16 16.5)"/>
  <circle cx="9" cy="16.5" r="1.2" fill="#cc2222"/>
  <circle cx="23" cy="16.5" r="1.2" fill="#cc2222"/>

  <!-- Skull face -->
  <!-- Head -->
  <ellipse cx="16" cy="22" rx="7" ry="6" fill="#d8dde4"/>
  <!-- Forehead -->
  <ellipse cx="16" cy="19" rx="7" ry="4" fill="#dde2e8"/>

  <!-- Eye sockets -->
  <ellipse cx="13" cy="21" rx="2.5" ry="2.2" fill="#0a0a0f"/>
  <ellipse cx="19" cy="21" rx="2.5" ry="2.2" fill="#0a0a0f"/>
  <!-- Red eyes glow -->
  <ellipse cx="13" cy="21" rx="1.5" ry="1.3" fill="#cc1111"/>
  <ellipse cx="19" cy="21" rx="1.5" ry="1.3" fill="#cc1111"/>
  <!-- Eye highlight -->
  <circle cx="12.4" cy="20.5" r="0.4" fill="#ff4444" opacity="0.8"/>
  <circle cx="18.4" cy="20.5" r="0.4" fill="#ff4444" opacity="0.8"/>

  <!-- Nose cavity -->
  <path d="M15.2 23.5 L16 22.5 L16.8 23.5 L16.5 24.5 L15.5 24.5 Z" fill="#0a0a0f"/>

  <!-- Teeth -->
  <rect x="13" y="25.5" width="1.5" height="2" rx="0.3" fill="#0a0a0f"/>
  <rect x="15" y="25.5" width="2" height="2.2" rx="0.3" fill="#0a0a0f"/>
  <rect x="17.5" y="25.5" width="1.5" height="2" rx="0.3" fill="#0a0a0f"/>
  <!-- Jaw line -->
  <rect x="10" y="25" width="12" height="1" rx="0.5" fill="#c0c8d0"/>
</svg>
