  #   depends_on: [postgres, redis]

  # api:
  #   build: ./apps/api
  #   ports:
  #     - "8081:8081"
  #   env_file: .env
  #   depends_on: [postgres, redis]

  # worker:
  #   build: ./apps/worker
  #   ports:
  #     - "8082:8082"
  #   env_file: .env
  #   depends_on: [postgres, redis]

volumes:
  postgres_data:
  redis_data:
