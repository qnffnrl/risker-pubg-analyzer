version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pubg_postgres
    environment:
      POSTGRES_USER: pubg
      POSTGRES_PASSWORD: pubg
      POSTGRES_DB: pubg_analyzer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pubg_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
